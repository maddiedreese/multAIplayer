[package]
name = "multaiplayer"
version = "0.1.0"
description = "Private group chat for coding with Codex."
authors = ["Maddie Dreese"]
edition = "2021"
license = "Apache-2.0"

[lib]
name = "multaiplayer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
keyring = "4.1.3"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
