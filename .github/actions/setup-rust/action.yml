name: Set up repository Rust toolchain
description: Installs the minimal toolchain declared by rust-toolchain.toml, plus job-specific components.

inputs:
  components:
    description: Space-separated Rust components required by this job.
    default: ""

runs:
  using: composite
  steps:
    - name: Install repository Rust toolchain
      shell: bash
      env:
        REQUIRED_COMPONENTS: ${{ inputs.components }}
      run: |
        channel="$(sed -n 's/^channel = "\([^"]*\)"$/\1/p' rust-toolchain.toml)"
        test -n "$channel" || {
          echo "rust-toolchain.toml does not declare a channel." >&2
          exit 1
        }
        rustup toolchain install "$channel" --profile minimal --force
        if [ -n "$REQUIRED_COMPONENTS" ]; then
          rustup component add --toolchain "$channel" $REQUIRED_COMPONENTS
        fi
        rustc "+$channel" --version
        cargo "+$channel" --version
