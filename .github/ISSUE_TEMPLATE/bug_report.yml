name: Bug Report
description: Report a reproducible multAIplayer bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve multAIplayer. Do not paste secrets, private repo code, room keys, GitHub tokens, Codex credentials, or plaintext private room transcripts.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest set of steps that triggers the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.0 or commit SHA
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - Relay
        - GitHub OAuth / Actions
        - Codex host handoff
        - Terminal
        - Browser
        - Files / diffs
        - Local preview
        - Invite / room join
        - Release / install
        - Docs
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets and private repo content before attaching anything.
