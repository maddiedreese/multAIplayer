name: Bug Report
description: Report a reproducible multAIplayer bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve multAIplayer. Never paste a complete invitation link or any invite fragment. Do not paste secrets, private repo code, room keys, GitHub tokens, Codex credentials, or plaintext private room transcripts.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest set of steps that triggers the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: desktop_version
    attributes:
      label: Desktop version or commit
      description: Use the version shown by the installed app, a release tag, or an exact commit SHA.
      placeholder: 0.1.0-alpha.0 or 5cb636467ca4c4508c1e06b01152f7091e28cff7
    validations:
      required: true
  - type: input
    id: relay_version
    attributes:
      label: Relay version or commit
      description: Ask the relay operator for its release tag or exact commit SHA. Enter "unknown" if unavailable.
      placeholder: 0.1.0-alpha.0, exact commit SHA, or unknown
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - Relay
        - GitHub OAuth / Actions
        - Codex host handoff
        - Terminal
        - Browser
        - Files / diffs
        - Local preview
        - Invite / room join
        - Release / install
        - Docs
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach diagnostics only after explicitly saving and reviewing them. Redact secrets, complete invite links/fragments, private repo content, and all room content before attaching anything else.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed every attachment and removed room content, private code, credentials, tokens, and complete invite links or fragments.
          required: true
