name: Dogfood Report
description: Report results from a real alpha dogfood session.
title: "[Dogfood]: "
labels: ["dogfood", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for two-person/two-device alpha testing. Never paste a complete invitation link or any invite fragment. Do not paste secrets, private repo code, room keys, GitHub tokens, Codex credentials, signed-in browser pages, terminal output, or plaintext private room transcripts.
  - type: textarea
    id: scenario
    attributes:
      label: Scenario tested
      description: List the flow you tested and whether it passed.
      placeholder: |
        - GitHub sign-in:
        - Invite join:
        - Codex approval:
        - Terminal:
        - Browser:
        - Host handoff:
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.1 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: relay
    attributes:
      label: Relay used
      options:
        - Local dev relay
        - Self-hosted relay
        - Official hosted relay
        - Other / unsure
  - type: input
    id: devices
    attributes:
      label: Devices/accounts
      description: Number of devices and GitHub accounts. Do not include tokens or private emails.
      placeholder: 2 macOS devices, 2 GitHub accounts
  - type: textarea
    id: blockers
    attributes:
      label: Blockers or regressions
      description: Describe anything that stopped the flow or felt unsafe/confusing.
  - type: textarea
    id: notes
    attributes:
      label: Notes or redacted screenshots
      description: Attach only redacted screenshots/logs. Remove complete invite links and fragments, including anything after `#`.
