name: Rust advisory audit

on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/src-tauri/Cargo.toml"
      - "apps/desktop/src-tauri/Cargo.lock"
      - ".github/workflows/rust-audit.yml"
  pull_request:
    paths:
      - "apps/desktop/src-tauri/Cargo.toml"
      - "apps/desktop/src-tauri/Cargo.lock"
      - ".github/workflows/rust-audit.yml"
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: RustSec advisories
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Audit Cargo.lock
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: apps/desktop/src-tauri
