name: Product journeys

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  schedule:
    - cron: "23 7 * * 2"
  workflow_dispatch:
    inputs:
      required_only:
        description: "When true, run only pull-request journey jobs"
        required: false
        default: false
        type: boolean

concurrency:
  group: journeys-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect product changes
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.paths.outputs.product }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Detect executable product and journey changes
        id: paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -o pipefail
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "product=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"; then
            echo "Could not compare the pull request with its base commit." >&2
            exit 1
          fi
          if grep -Eq '^(apps|packages|e2e)/|^scripts/run-e2e\.mjs$|^package(-lock)?\.json$|^\.github/(actions|workflows/journeys\.yml)' <<< "$changed_files"; then
            echo "product=true" >> "$GITHUB_OUTPUT"
          else
            echo "product=false" >> "$GITHUB_OUTPUT"
          fi

  web-shell-e2e:
    name: UI contract journeys
    needs: changes
    if: needs.changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run UI contract journeys
        run: npm run test:e2e
      - name: Upload journey failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-shell-journey-failures
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  native-shell-e2e:
    name: Real two-client native MLS journey
    needs: changes
    if: needs.changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0
      - name: Install Tauri, WebDriver, display, and Secret Service dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          build-essential
          dbus-x11
          gnome-keyring
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          libwebkit2gtk-4.1-dev
          libxdo-dev
          webkit2gtk-driver
          xvfb
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Build package dependencies and the real KeyPackage validator
        run: |
          npm run build:packages
          cargo build --locked --manifest-path apps/desktop/src-tauri/Cargo.toml -p mls-core --bin mls-keypackage-validator
      - name: Install pinned Tauri WebDriver bridge
        run: cargo install tauri-driver --version 2.0.6 --locked
      - name: Run two real native clients through invite, message, and handoff
        run: xvfb-run -a npm run test:e2e:native
      - name: Upload native journey duration metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-shell-journey-metrics
          path: reports/native-shell-e2e/duration.json
          if-no-files-found: error
          retention-days: 30
      - name: Upload native journey failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-shell-journey-failures
          path: |
            apps/desktop/src-tauri/target/debug/*.log
            reports/native-shell-e2e
          if-no-files-found: ignore
          retention-days: 7
      - name: Explain native journey failure handling
        if: failure()
        run: |
          {
            echo "### Failure posture"
            echo
            echo "Treat intermittent behavior as a product race until the failing stage, screenshots, logs, and duration report identify another cause. Do not rerun blindly."
          } >> "$GITHUB_STEP_SUMMARY"

  macos-two-client:
    name: Scheduled macOS two-client MLS journey
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.required_only == false)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install dependencies
        run: npm ci
      - name: Build packages and native MLS clients
        run: npm run build:packages
      - name: Run two native MLS clients against a live relay
        run: |
          mkdir -p reports/macos-two-client
          npx tsx --test --test-reporter=junit apps/relay/test/live-native-relay-journey.test.ts > reports/macos-two-client/junit.xml
      - name: Upload two-client journey result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-two-client-journey
          path: reports/macos-two-client/junit.xml
          if-no-files-found: error
          retention-days: 30

  relay-security-depth:
    name: Scheduled relay security depth
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.required_only == false)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Fuzz relay message and envelope parsing
        run: npm run test:fuzz -w @multaiplayer/relay
      - name: Exercise relay churn, restart, backup, and restore
        env:
          MULTAIPLAYER_RELAY_SOAK_DURATION_MS: "300000"
          MULTAIPLAYER_RELAY_SOAK_CLIENTS: "32"
          MULTAIPLAYER_RELAY_SOAK_RESTART_CYCLES: "4"
        run: npm run test:soak -w @multaiplayer/relay
      - name: Upload relay soak evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: relay-chaos-soak
          path: apps/relay/reports/soak
          if-no-files-found: error
          retention-days: 14

  mls-deserialization-fuzz:
    name: Native untrusted-input fuzz smoke tests
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.required_only == false)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Restore and extend native fuzz corpora
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/src-tauri/crates/mls-core/fuzz/corpus
          key: native-fuzz-corpus-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: native-fuzz-corpus-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.lock') }}-
      - name: Install nightly Rust and pinned cargo-fuzz
        run: |
          rustup toolchain install nightly --profile minimal
          cargo +nightly install cargo-fuzz --version 0.12.0 --locked
      - name: Fuzz bounded validator JSON, MLS KeyPackage, and credential parsing
        working-directory: apps/desktop/src-tauri/crates/mls-core
        run: cargo +nightly fuzz run key_package_deserialization -- -max_total_time=120
      - name: Fuzz Codex app-server activity projection
        working-directory: apps/desktop/src-tauri/crates/mls-core
        run: cargo +nightly fuzz run codex_app_server_projection -- -max_total_time=120
      - name: Upload minimized fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mls-deserialization-fuzz-artifacts
          path: apps/desktop/src-tauri/crates/mls-core/fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 14

  macos-desktop:
    name: macOS desktop package
    needs: changes
    if: github.event_name != 'schedule' && needs.changes.outputs.product == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install dependencies
        run: npm ci
      - name: Build desktop package dependencies
        run: npm run build:packages
      - name: Install Apple silicon Rust target
        run: rustup target add aarch64-apple-darwin
      - name: Build test-only macOS app with embedded WebDriver
        env:
          VITE_NATIVE_E2E: "true"
        run: npm run tauri:build:native-e2e -w @multaiplayer/desktop
      - name: Smoke-test packaged WKWebView input and Tauri IPC
        run: npm run test:e2e:native:macos-smoke
      - name: Upload macOS WKWebView smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-wkwebview-smoke
          path: reports/native-macos-smoke
          if-no-files-found: error
          retention-days: 14
      - name: Rebuild the production frontend without the test driver
        run: npm run build -w @multaiplayer/desktop
      - name: Build ad-hoc signed Tauri app without public updater artifacts
        env:
          APPLE_SIGNING_IDENTITY: "-"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: npm run tauri:build:prebuilt -w @multaiplayer/desktop -- --target aarch64-apple-darwin
      - name: Verify Apple silicon deployment target and entitlements
        run: |
          app_path="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app"
          test "$(lipo -archs "$app_path/Contents/MacOS/multAIplayer")" = "arm64"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$app_path/Contents/Info.plist")" = "11.0"
          bash scripts/verify-macos-deployment-target.sh "$app_path"
          npm run verify:macos-associated-domains -- "$app_path"
      - name: Upload macOS packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multaiplayer-macos-packages
          path: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  required-journeys:
    name: Required product journeys
    if: always() && github.event_name != 'schedule'
    needs: [changes, web-shell-e2e, native-shell-e2e, macos-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful journeys when product code changed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          PRODUCT_CHANGED: ${{ needs.changes.outputs.product }}
          UI_RESULT: ${{ needs.web-shell-e2e.result }}
          NATIVE_RESULT: ${{ needs.native-shell-e2e.result }}
          MACOS_RESULT: ${{ needs.macos-desktop.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Product-change detection did not succeed: $CHANGES_RESULT" >&2
            exit 1
          fi
          if [ "$PRODUCT_CHANGED" = "false" ]; then
            echo "No executable product or journey files changed."
            exit 0
          fi
          if [ "$PRODUCT_CHANGED" != "true" ]; then
            echo "Product-change detection returned an invalid result: $PRODUCT_CHANGED" >&2
            exit 1
          fi
          for result in "$UI_RESULT" "$NATIVE_RESULT" "$MACOS_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "A required product journey did not succeed: $result" >&2
              exit 1
            fi
          done
