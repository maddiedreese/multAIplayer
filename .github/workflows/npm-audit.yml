name: npm advisory audit

on:
  schedule:
    - cron: "23 9 * * 1"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: npm advisories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production and development dependencies
        run: npm run audit:npm
