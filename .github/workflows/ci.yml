name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-and-relay:
    name: Web, relay, and packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check workspaces
        run: npm run check

      - name: Test workspaces
        run: npm test

      - name: Build workspaces
        run: npm run build

  macos-desktop:
    name: macOS desktop package
    runs-on: macos-15
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Verify workspaces and native tests
        run: npm run verify

      - name: Build unsigned Tauri app
        run: npm run tauri:build -w @multaiplayer/desktop

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v6
        with:
          name: multAIplayer-macos-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v6
        with:
          name: multAIplayer-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
