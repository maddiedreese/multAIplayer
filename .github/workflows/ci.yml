name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "23 7 * * 2"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contribution-attestation:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Require a Signed-off-by trailer on every pull-request commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing="$(git log --format='%H%x09%(trailers:key=Signed-off-by,valueonly)' "$BASE_SHA..$HEAD_SHA" | awk -F '\t' 'NF < 2 || $2 == "" { print $1 }')"
          if [ -n "$missing" ]; then
            echo "Commits missing a Signed-off-by trailer:"
            echo "$missing"
            echo "Amend each commit with git commit -s and update the pull request."
            exit 1
          fi

  web-and-relay:
    name: Web, relay, and packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify web, relay, and packages
        run: npm run verify:web

      - name: Measure package and security-critical relay coverage
        run: npm run test:coverage

      - name: Fuzz relay message and envelope parsing
        run: npm run test:fuzz -w @multaiplayer/relay

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-and-relay-coverage
          path: |
            apps/relay/coverage
            packages/*/coverage
          if-no-files-found: error
          retention-days: 14

  desktop-coverage:
    name: Desktop TypeScript coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Measure desktop coverage and enforce invite/MLS-adjacent floors
        run: npm run test:coverage:desktop
      - name: Upload desktop coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-typescript-coverage
          path: |
            apps/desktop/coverage
            apps/desktop/coverage-critical
          if-no-files-found: error
          retention-days: 14

  relay-authorization-mutation:
    name: Relay authorization mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Mutation-test relay authorization
        run: npm run test:mutation -w @multaiplayer/relay
      - name: Publish relay mutation score
        if: always() && hashFiles('apps/relay/reports/mutation/summary.json') != ''
        run: node scripts/write-mutation-step-summary.mjs "Relay authorization mutation score" apps/relay/reports/mutation/summary.json
      - name: Upload relay authorization mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: relay-authorization-mutation-report
          path: apps/relay/reports/mutation
          if-no-files-found: error
          retention-days: 14

  protocol-type-guard-mutation:
    name: Protocol type-guard mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Mutation-test protocol type guards
        run: npm run test:mutation -w @multaiplayer/protocol
      - name: Publish protocol mutation score
        if: always() && hashFiles('packages/protocol/reports/mutation/summary.json') != ''
        run: node scripts/write-mutation-step-summary.mjs "Protocol type-guard mutation score" packages/protocol/reports/mutation/summary.json
      - name: Upload protocol type-guard mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: protocol-type-guard-mutation-report
          path: packages/protocol/reports/mutation
          if-no-files-found: error
          retention-days: 14

  rust-shell-boundary-mutation:
    name: Rust shell boundary mutation policy
    runs-on: macos-15
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install pinned cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Mutation-test native shell authorization and command safety
        working-directory: apps/desktop/src-tauri
        run: >-
          cargo mutants
          --cargo-arg=--locked
          --file src/shell_authorization.rs
          --file src/command_safety.rs
          --in-place
          --no-shuffle
          --timeout 120
      - name: Upload Rust mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-shell-boundary-mutation-report
          path: apps/desktop/src-tauri/mutants.out
          if-no-files-found: error
          retention-days: 14

  mls-invite-authenticator-mutation:
    name: MLS invite authenticator mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install pinned cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Mutation-test MLS invite authentication
        working-directory: apps/desktop/src-tauri
        run: >-
          cargo mutants
          --cargo-arg=--locked
          --package mls-core
          --file crates/mls-core/src/invite_capability.rs
          --re 'invite_capability.rs.*(encode_capability_binding|mac_binding|verify_request_binding|mac_response_binding|verify_response_binding|authenticate|verify|derive_mac_key|validate)'
          --in-place
          --no-shuffle
          --jobs 2
          --timeout 120
      - name: Upload MLS invite authenticator mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mls-invite-authenticator-mutation-report
          path: apps/desktop/src-tauri/mutants.out
          if-no-files-found: error
          retention-days: 14

  mls-deserialization-fuzz:
    name: Native untrusted-input fuzz smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Restore and extend native fuzz corpora
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/src-tauri/crates/mls-core/fuzz/corpus
          key: native-fuzz-corpus-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            native-fuzz-corpus-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.lock') }}-
      - name: Install nightly Rust
        run: rustup toolchain install nightly --profile minimal
      - name: Install pinned cargo-fuzz
        run: cargo +nightly install cargo-fuzz --version 0.12.0 --locked
      - name: Fuzz bounded validator JSON, MLS KeyPackage, and credential parsing
        working-directory: apps/desktop/src-tauri/crates/mls-core
        run: cargo +nightly fuzz run key_package_deserialization -- -max_total_time=120
      - name: Fuzz Codex app-server activity projection
        working-directory: apps/desktop/src-tauri/crates/mls-core
        run: cargo +nightly fuzz run codex_app_server_projection -- -max_total_time=120
      - name: Upload minimized fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mls-deserialization-fuzz-artifacts
          path: apps/desktop/src-tauri/crates/mls-core/fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 14

  mls-validator-benchmark:
    name: MLS validator latency budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Benchmark the real validator process
        run: npm run bench:mls-validator -- --samples 100 --warmups 10 --concurrency 1 --output reports/mls-validator-benchmark.json
      - name: Enforce validator latency budget
        run: node scripts/check-mls-validator-benchmark.mjs reports/mls-validator-benchmark.json
      - name: Publish validator latency summary
        if: always() && hashFiles('reports/mls-validator-benchmark.json') != ''
        run: |
          node -e 'const report = require("./reports/mls-validator-benchmark.json"); process.stdout.write(`### MLS validator benchmark\n\n| Samples | Mean | p95 | Throughput |\n| ---: | ---: | ---: | ---: |\n| ${report.samples} | ${report.latencyMs.mean} ms | ${report.latencyMs.p95} ms | ${report.throughputPerSecond}/s |\n`)' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload validator benchmark report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mls-validator-benchmark
          path: reports/mls-validator-benchmark.json
          if-no-files-found: error
          retention-days: 30

  web-shell-e2e:
    name: Web shell journeys
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web shell journeys
        run: npm run test:e2e

      - name: Upload journey failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-shell-journey-failures
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  native-shell-e2e:
    name: Real two-client native MLS journey
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify native journey applicability
        id: native-policy
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed_files="$RUNNER_TEMP/native-journey-changed-files"
            if ! git diff --no-renames --name-only -z "$BASE_SHA" "$HEAD_SHA" > "$changed_files"; then
              : > "$changed_files"
            fi
            node scripts/native-journey-change-policy.mjs --changed-files "$changed_files" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=Required for $EVENT_NAME runs, including main, scheduled, manual, and release-tag evidence." >> "$GITHUB_OUTPUT"
          fi

      - name: Report native journey policy decision
        env:
          RUN_JOURNEY: ${{ steps.native-policy.outputs.run }}
          POLICY_REASON: ${{ steps.native-policy.outputs.reason }}
        run: |
          {
            echo "## Real two-client native MLS journey"
            echo
            if [ "$RUN_JOURNEY" = "true" ]; then
              echo "**Required.** $POLICY_REASON"
            else
              echo "**Not applicable.** $POLICY_REASON"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node
        if: steps.native-policy.outputs.run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install pinned Rust toolchain
        if: steps.native-policy.outputs.run == 'true'
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0

      - name: Install Tauri, WebDriver, display, and Secret Service dependencies
        if: steps.native-policy.outputs.run == 'true'
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          build-essential
          dbus-x11
          gnome-keyring
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          libwebkit2gtk-4.1-dev
          libxdo-dev
          webkit2gtk-driver
          xvfb

      - name: Install JavaScript dependencies
        if: steps.native-policy.outputs.run == 'true'
        run: npm ci

      - name: Build package dependencies and the real KeyPackage validator
        if: steps.native-policy.outputs.run == 'true'
        run: |
          npm run build:packages
          cargo build --locked --manifest-path apps/desktop/src-tauri/Cargo.toml -p mls-core --bin mls-keypackage-validator

      - name: Install pinned Tauri WebDriver bridge
        if: steps.native-policy.outputs.run == 'true'
        run: cargo install tauri-driver --version 2.0.6 --locked

      - name: Run two real native clients through invite, message, and handoff
        if: steps.native-policy.outputs.run == 'true'
        run: xvfb-run -a npm run test:e2e:native

      - name: Enforce native journey duration policy
        if: steps.native-policy.outputs.run == 'true'
        run: node scripts/check-native-journey-duration.mjs reports/native-shell-e2e/duration.json

      - name: Upload native journey duration metrics
        if: always() && steps.native-policy.outputs.run == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-shell-journey-metrics
          path: reports/native-shell-e2e/duration.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload native journey failure artifacts
        if: failure() && steps.native-policy.outputs.run == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-shell-journey-failures
          path: |
            apps/desktop/src-tauri/target/debug/*.log
            reports/native-shell-e2e
          if-no-files-found: ignore
          retention-days: 7

      - name: Explain native journey failure handling
        if: failure() && steps.native-policy.outputs.run == 'true'
        run: |
          {
            echo
            echo "### Failure posture"
            echo
            echo "Treat intermittent behavior as a product race until the failing stage, screenshots, logs, and duration report identify another cause. Do not rerun blindly."
          } >> "$GITHUB_STEP_SUMMARY"

  security-journey:
    name: Multi-client security journey and injection red-team
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
      - name: Build package dependencies
        run: npm run build:packages
      - name: Run deterministic lifecycle and adversarial corpus
        run: |
          mkdir -p reports/security-journey
          npm run test:security-journey -w @multaiplayer/relay > reports/security-journey/junit.xml
          node scripts/assert-security-journey-executed.mjs reports/security-journey/junit.xml
      - name: Upload security journey results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-journey-results
          path: reports/security-journey/junit.xml
          if-no-files-found: error
          retention-days: 14

  macos-desktop:
    name: macOS desktop package
    runs-on: macos-15
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Verify native formatting, lints, and tests
        run: npm run verify:native

      - name: Build desktop package dependencies
        run: npm run build:packages

      - name: Install Apple silicon Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build test-only macOS app with embedded WebDriver
        env:
          VITE_NATIVE_E2E: "true"
        run: npm run tauri:build:native-e2e -w @multaiplayer/desktop

      - name: Smoke-test packaged WKWebView input and Tauri IPC
        run: npm run test:e2e:native:macos-smoke

      - name: Upload macOS WKWebView smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-wkwebview-smoke
          path: reports/native-macos-smoke
          if-no-files-found: error
          retention-days: 14

      - name: Rebuild the production frontend without the test driver
        run: npm run build -w @multaiplayer/desktop

      - name: Run macOS native-core and relay composition journey
        run: npx tsx --test apps/relay/test/live-native-relay-journey.test.ts

      - name: Build ad-hoc signed Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: npm run tauri:build:release -w @multaiplayer/desktop

      - name: Verify Apple silicon deployment target
        run: |
          app_path="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app"
          archs="$(lipo -archs "$app_path/Contents/MacOS/multAIplayer")"
          if [ "$archs" != "arm64" ]; then
            echo "CI package executable must contain only arm64; found: $archs" >&2
            exit 1
          fi
          minimum_system_version="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$app_path/Contents/Info.plist")"
          if [ "$minimum_system_version" != "11.0" ]; then
            echo "CI package minimum macOS version must be 11.0; found: $minimum_system_version" >&2
            exit 1
          fi
          bash scripts/verify-macos-deployment-target.sh "$app_path"

      - name: Verify packaged associated-domain entitlements
        run: npm run verify:macos-associated-domains -- apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multAIplayer-macos-app
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multAIplayer-macos-dmg
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
