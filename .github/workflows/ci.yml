name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-and-relay:
    name: Web, relay, and packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify web, relay, and packages
        run: npm run verify:web

      - name: Measure package and security-critical relay coverage
        run: npm run test:coverage

      - name: Fuzz relay message and envelope parsing
        run: npm run test:fuzz -w @multaiplayer/relay

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-and-relay-coverage
          path: |
            apps/relay/coverage
            packages/*/coverage
          if-no-files-found: error
          retention-days: 14

  crypto-mutation:
    name: Crypto mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package dependencies
        run: npm run build:packages

      - name: Mutation-test cryptographic authorization logic
        run: npm run test:mutation -w @multaiplayer/crypto

      - name: Upload crypto mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crypto-mutation-report
          path: packages/crypto/reports/mutation
          if-no-files-found: error
          retention-days: 14

  relay-authorization-mutation:
    name: Relay authorization mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Mutation-test relay authorization
        run: npm run test:mutation -w @multaiplayer/relay
      - name: Upload relay authorization mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: relay-authorization-mutation-report
          path: apps/relay/reports/mutation
          if-no-files-found: error
          retention-days: 14

  protocol-type-guard-mutation:
    name: Protocol type-guard mutation policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Mutation-test protocol type guards
        run: npm run test:mutation -w @multaiplayer/protocol
      - name: Upload protocol type-guard mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: protocol-type-guard-mutation-report
          path: packages/protocol/reports/mutation
          if-no-files-found: error
          retention-days: 14

  web-shell-e2e:
    name: Web shell journeys
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web shell journeys
        run: npm run test:e2e

      - name: Upload journey failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-shell-journey-failures
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  macos-desktop:
    name: macOS desktop package
    runs-on: macos-15
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Verify native formatting, lints, and tests
        run: npm run verify:native

      - name: Build desktop prerequisites
        run: npm run build:packages && npm run build -w @multaiplayer/desktop

      - name: Build unsigned Tauri app
        run: npm run tauri:build:prebuilt -w @multaiplayer/desktop

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multAIplayer-macos-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multAIplayer-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
