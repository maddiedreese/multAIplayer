name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed domains
    runs-on: ubuntu-latest
    outputs:
      documentation: ${{ steps.paths.outputs.documentation }}
      workflow: ${{ steps.paths.outputs.workflow }}
      javascript: ${{ steps.paths.outputs.javascript }}
      native: ${{ steps.paths.outputs.native }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate squash-commit title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-title.mjs "$PR_TITLE"
      - name: Classify changed paths
        id: paths
        uses: ./.github/actions/changed-domains

  documentation:
    name: Maintained documentation
    needs: changes
    if: needs.changes.outputs.documentation == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install documentation-check dependency
        run: npm ci --ignore-scripts
      - name: Check maintained documentation, links, and issue templates
        run: npm run docs:check

  workflow-policy:
    name: GitHub Actions syntax and repository policy
    needs: changes
    if: needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install checksum-pinned actionlint 1.7.7
        shell: bash
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --silent --show-error \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            --output "$archive"
          echo "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version
      - name: Validate every GitHub Actions workflow
        run: |
          "$RUNNER_TEMP/actionlint" -color

  web-and-relay:
    name: Web, relay, and packages
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install dependencies
        run: npm ci
      - name: Set up repository Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Derive the relay runtime closure from the real locked npm tree
        run: |
          npm ls --omit=dev --all --json -w @multaiplayer/relay > "$RUNNER_TEMP/relay-production-tree.json"
          node tools/release/relay-runtime-dependency-closure.mjs \
            check-tree node_modules "$RUNNER_TEMP/relay-production-tree.json"
      - name: Verify web, relay, and packages
        run: node --test tools/ci/*.test.mjs && npm run lint && npm run format:check && npm run check:security-exceptions && npm run test:release-tools && npm run check:release-versions && npm run build:packages && npm run test:workspaces && npm run build:apps

  native-core:
    name: Native formatting, lints, and tests
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install dependencies
        run: npm ci
      - name: Set up repository Rust toolchain and native lint components
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt clippy
      - name: Install native Linux build dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          libwebkit2gtk-4.1-dev
      - name: Verify native code and release metadata
        run: npm run check:release-versions && npm run fmt:rust:check && npm run lint:rust && npm run test:native

  required-core-checks:
    name: Required core checks
    if: always()
    needs: [changes, documentation, workflow-policy, web-and-relay, native-core]
    runs-on: ubuntu-latest
    steps:
      - name: Require every core check
        env:
          WORKFLOW_POLICY_RESULT: ${{ needs.workflow-policy.result }}
          DOCUMENTATION_RESULT: ${{ needs.documentation.result }}
          WEB_RELAY_RESULT: ${{ needs.web-and-relay.result }}
          NATIVE_RESULT: ${{ needs.native-core.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          WORKFLOW_CHANGED: ${{ needs.changes.outputs.workflow }}
          DOCUMENTATION_CHANGED: ${{ needs.changes.outputs.documentation }}
          JAVASCRIPT_CHANGED: ${{ needs.changes.outputs.javascript }}
          NATIVE_CHANGED: ${{ needs.changes.outputs.native }}
        run: |
          [ "$CHANGES_RESULT" = "success" ] || exit 1
          require_when_changed() {
            changed="$1"
            result="$2"
            if [ "$changed" != "true" ] && [ "$changed" != "false" ]; then
              echo "Changed-path detection returned an invalid value: $changed" >&2
              exit 1
            fi
            if [ "$changed" = "true" ] && [ "$result" != "success" ]; then
              echo "A selected core check did not succeed: $result" >&2
              exit 1
            fi
            if [ "$changed" = "false" ] && [ "$result" != "skipped" ]; then
              echo "An unselected core check unexpectedly ran: $result" >&2
              exit 1
            fi
          }
          require_when_changed "$DOCUMENTATION_CHANGED" "$DOCUMENTATION_RESULT"
          require_when_changed "$WORKFLOW_CHANGED" "$WORKFLOW_POLICY_RESULT"
          require_when_changed "$JAVASCRIPT_CHANGED" "$WEB_RELAY_RESULT"
          require_when_changed "$NATIVE_CHANGED" "$NATIVE_RESULT"
