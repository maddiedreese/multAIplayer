name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-and-relay:
    name: Web, relay, and packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Keep security-journey evidence linked to canonical claims
        shell: bash
        run: |
          for marker in \
            'MLS-PLAINTEXT-MUST-NEVER-REACH-RELAY' \
            'MLS-REMOVED-MEMBER-MUST-NOT-DECRYPT' \
            'ghp_GITHUB_TOKEN_MUST_NEVER_REACH_RELAY_STORAGE_OR_ROOM_WIRE' \
            '/Users/sentinel/PROJECT-PATH-MUST-NEVER-REACH-RELAY' \
            'sentinel-model-MUST-NEVER-REACH-RELAY'
          do
            grep -Fq "$marker" docs/threat-model.md || {
              echo "Missing canonical threat-model reference for journey marker: $marker" >&2
              exit 1
            }
          done
      - name: Verify web, relay, and packages
        run: npm run lint && npm run format:check && npm run check:tauri-command-errors && npm run build:packages && npm run test:harness && npm run test:workspaces && npm run build:apps
      - name: Measure package coverage and the relay authorization floor
        run: npm run test:coverage
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-and-relay-coverage
          path: |
            apps/relay/coverage
            packages/*/coverage
          if-no-files-found: error
          retention-days: 14

  desktop-coverage:
    name: Desktop TypeScript coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package dependencies
        run: npm run build:packages
      - name: Measure desktop coverage
        run: npm run test:coverage:desktop
      - name: Upload desktop coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-typescript-coverage
          path: |
            apps/desktop/coverage
            apps/desktop/coverage-critical
            apps/desktop/coverage-host-actions
            apps/desktop/coverage-host-handoff
          if-no-files-found: error
          retention-days: 14

  native-core:
    name: Native formatting, lints, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install native Linux build dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          libwebkit2gtk-4.1-dev
      - name: Verify native code and release metadata
        run: npm run check:release-versions && npm run fmt:rust:check && npm run lint:rust && npm run test:native

  journey-path-gate:
    name: Journey path gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Explain journey routing
        run: echo "Journey workflows run on pull requests that touch native, relay protocol, invite, MLS, or onboarding paths."

  ui-contract-journey-sentinel:
    name: UI contract journeys
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Required-check sentinel; applicable journey work is routed by journeys.yml path filters."

  security-journey-sentinel:
    name: Multi-client security journey and injection red-team
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Required-check sentinel; applicable journey work is routed by journeys.yml path filters."

  macos-desktop-sentinel:
    name: macOS desktop package
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Required-check sentinel; applicable journey work is routed by journeys.yml path filters."
