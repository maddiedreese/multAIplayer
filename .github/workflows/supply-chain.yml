name: Supply-chain security

on:
  schedule:
    - cron: "47 8 * * 4"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep community rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Semgrep
        run: |
          pipx install semgrep==1.127.1
          pipx runpip semgrep install --force-reinstall setuptools==80.9.0
      - name: Scan TypeScript and JavaScript
        run: semgrep scan --error --config p/typescript --config p/nodejs --config p/owasp-top-ten apps packages scripts

  relay-container:
    name: Relay container vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build relay image
        run: docker build --tag multaiplayer-relay:scan --file apps/relay/Dockerfile .
      - name: Scan relay image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: multaiplayer-relay:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  reproducibility-contract:
    name: Reproducible-build contract and relay proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify documented locked build inputs
        run: node scripts/verify-reproducible-builds.mjs
      - name: Rebuild and compare relay containers
        run: node scripts/verify-relay-container-reproducibility.mjs
