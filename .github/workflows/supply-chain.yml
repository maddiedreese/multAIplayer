name: Supply-chain security

on:
  workflow_call:
    inputs:
      commit:
        description: Exact commit to verify before release publication.
        required: true
        type: string
  schedule:
    - cron: "47 8 * * 4"
  release:
    types: [published]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  exception-policy:
    if: github.event_name != 'pull_request'
    name: Temporary security-exception expiry
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Reject expired scanner and advisory exceptions
        run: node tools/security/check-exception-expiry.mjs

  secrets:
    if: github.event_name != 'pull_request'
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.sha }}
      - name: Install checksum-pinned Gitleaks 8.30.1
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --silent --show-error \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            --output "$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
      - name: Scan full history with the narrow fixture allowlist
        run: |
          "$RUNNER_TEMP/gitleaks" git --config .gitleaks.toml --redact --no-banner .
  relay-container:
    if: github.event_name != 'pull_request'
    name: Relay container vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Build relay image
        run: docker build --tag multaiplayer-relay:scan --file apps/relay/Dockerfile .
      - name: Verify minimal relay runtime contents
        run: >-
          docker run --rm --entrypoint node multaiplayer-relay:scan
          tools/release/relay-runtime-dependency-closure.mjs
          verify node_modules relay-runtime-dependencies.json
      - name: Scan relay image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: multaiplayer-relay:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  updater-contract:
    if: github.event_name != 'pull_request'
    name: Signed-updater contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Set up repository Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Install native updater test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev
      - name: Execute signed-updater authentication contract tests
        run: npm run verify:updater-contract
  npm-and-license-policy:
    if: github.event_name != 'pull_request'
    name: npm advisories and license policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install locked dependencies
        run: npm ci
      - name: Audit dependencies and enforce licenses
        run: npm run audit:npm && npm run license:check

  rust-policy:
    if: github.event_name != 'pull_request'
    name: RustSec and dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Install locked audit tools
        run: |
          cargo install cargo-audit --version 0.22.0 --locked
          cargo install cargo-deny --version 0.19.7 --locked
      - name: Audit locked dependencies
        working-directory: apps/desktop/src-tauri
        run: |
          cargo audit
          cargo audit --file crates/mls-core/fuzz/Cargo.lock
      - name: Enforce advisories and sources
        run: |
          cargo deny --manifest-path apps/desktop/src-tauri/Cargo.toml check advisories sources
          cargo deny --manifest-path apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.toml check advisories sources

  codeql:
    name: JavaScript and TypeScript CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          config-file: ./.github/codeql-config.yml
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  codex-contract:
    if: github.event_name != 'pull_request'
    name: Latest app-server compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install repository dependencies
        run: npm ci
      - name: Generate latest Codex app-server contract
        id: contract
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/codex-schema"
          set +e
          set -o pipefail
          {
            npm install --prefix "$RUNNER_TEMP/latest-codex" --no-audit --no-fund @openai/codex@latest
            codex="$RUNNER_TEMP/latest-codex/node_modules/.bin/codex"
            version="$($codex --version | awk '{print $NF}')"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            "$codex" app-server generate-json-schema --out "$RUNNER_TEMP/codex-schema"
            node tools/codex/generate-schema-manifest.mjs --schema-dir "$RUNNER_TEMP/codex-schema" --codex-version "$version" --out "$RUNNER_TEMP/latest-codex-manifest.json"
            node scripts/check-latest-codex-contract.mjs "$RUNNER_TEMP/latest-codex-manifest.json"
            node scripts/check-latest-codex-runtime.mjs "$codex"
          } 2>&1 | tee "$RUNNER_TEMP/codex-contract-result.txt"
          status=${PIPESTATUS[0]}
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: File a deduplicated compatibility issue
        if: steps.contract.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          CODEX_VERSION: ${{ steps.contract.outputs.version }}
        shell: bash
        run: |
          marker="<!-- codex-app-server-contract-drift -->"
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search 'Codex app-server contract drift in:title' --json body --jq ".[] | select(.body | contains(\"$marker\")) | .body" --limit 1)"
          if [ -n "$existing" ]; then
            echo "An open Codex contract-drift issue already exists."
            exit 0
          fi
          {
            echo "$marker"
            echo "The scheduled contract check found that Codex $CODEX_VERSION no longer preserves the supported app-server contract."
            echo
            echo '```text'
            cat "$RUNNER_TEMP/codex-contract-result.txt"
            echo '```'
            echo
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > "$RUNNER_TEMP/codex-contract-issue.md"
          gh issue create --repo "$GITHUB_REPOSITORY" --title "Codex app-server contract drift: $CODEX_VERSION" --body-file "$RUNNER_TEMP/codex-contract-issue.md"
      - name: Fail on contract drift
        if: steps.contract.outputs.status != '0'
        run: exit 1
