name: Supply-chain security

on:
  workflow_call:
    inputs:
      commit:
        description: Exact commit to verify before release publication.
        required: true
        type: string
  schedule:
    - cron: "47 8 * * 4"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exception-policy:
    name: Temporary security-exception expiry
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Reject expired scanner and advisory exceptions
        run: node tools/security/check-exception-expiry.mjs

  secrets:
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.sha }}
      - name: Install checksum-pinned Gitleaks 8.30.1
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --silent --show-error \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            --output "$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
      - name: Scan full history with the narrow fixture allowlist
        run: |
          "$RUNNER_TEMP/gitleaks" git --config .gitleaks.toml --redact --no-banner .
  relay-container:
    name: Relay container vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Build relay image
        run: docker build --tag multaiplayer-relay:scan --file apps/relay/Dockerfile .
      - name: Verify minimal relay runtime contents
        run: >-
          docker run --rm --entrypoint node multaiplayer-relay:scan
          tools/release/relay-runtime-dependency-closure.mjs
          verify node_modules relay-runtime-dependencies.json
      - name: Scan relay image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: multaiplayer-relay:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  updater-contract:
    name: Signed-updater contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Set up repository Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Install native updater test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev
      - name: Execute signed-updater authentication contract tests
        run: npm run verify:updater-contract
  npm-and-license-policy:
    name: npm advisories and license policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install locked dependencies
        run: npm ci
      - name: Audit dependencies and enforce licenses
        run: npm run audit:npm && npm run license:check

  rust-policy:
    name: RustSec and dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Install locked audit tools
        run: |
          cargo install cargo-audit --version 0.22.0 --locked
          cargo install cargo-deny --version 0.19.7 --locked
      - name: Audit locked dependencies
        working-directory: apps/desktop/src-tauri
        run: |
          cargo audit
          cargo audit --file crates/mls-core/fuzz/Cargo.lock
      - name: Enforce advisories and sources
        run: |
          cargo deny --manifest-path apps/desktop/src-tauri/Cargo.toml check advisories sources
          cargo deny --manifest-path apps/desktop/src-tauri/crates/mls-core/fuzz/Cargo.toml check advisories sources

  codex-contract:
    name: Latest app-server compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      drift: ${{ steps.contract.outputs.drift }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.commit || github.sha }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install repository dependencies
        run: npm ci
      - name: Install Codex and generate its app-server contract
        id: prepare
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/codex-schema"
          npm install --prefix "$RUNNER_TEMP/latest-codex" --no-audit --no-fund @openai/codex@latest
          codex="$RUNNER_TEMP/latest-codex/node_modules/.bin/codex"
          version="$($codex --version | awk '{print $NF}')"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Codex returned an invalid version: $version" >&2
            exit 1
          fi
          "$codex" app-server generate-json-schema --out "$RUNNER_TEMP/codex-schema"
          node tools/codex/generate-schema-manifest.mjs --schema-dir "$RUNNER_TEMP/codex-schema" --codex-version "$version" --out "$RUNNER_TEMP/latest-codex-manifest.json"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check the generated contract and installed runtime
        id: contract
        shell: bash
        env:
          CODEX_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          set +e
          (
            set -e
            node scripts/check-latest-codex-contract.mjs "$RUNNER_TEMP/latest-codex-manifest.json"
            node scripts/check-latest-codex-runtime.mjs "$RUNNER_TEMP/latest-codex/node_modules/.bin/codex"
          )
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            drift=false
          else
            drift=true
          fi
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
          jq --null-input \
            --arg version "$CODEX_VERSION" \
            --argjson drift "$drift" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{schemaVersion: 1, version: $version, drift: $drift, runUrl: $run_url}' \
            > "$RUNNER_TEMP/codex-contract-summary.json"
      - name: Upload inert compatibility summary
        if: always() && steps.contract.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-contract-summary
          path: ${{ runner.temp }}/codex-contract-summary.json
          if-no-files-found: error
          retention-days: 7
      - name: Fail on contract drift
        if: steps.contract.outputs.drift == 'true'
        run: exit 1

  codex-contract-issue:
    name: Report latest app-server incompatibility
    needs: codex-contract
    if: always() && needs.codex-contract.outputs.drift == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Download inert compatibility summary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codex-contract-summary
          path: ${{ runner.temp }}/codex-contract-summary
      - name: Validate compatibility summary
        id: summary
        shell: bash
        run: |
          summary="$RUNNER_TEMP/codex-contract-summary/codex-contract-summary.json"
          test "$(jq --raw-output '.schemaVersion' "$summary")" = "1"
          test "$(jq --raw-output '.drift' "$summary")" = "true"
          version="$(jq --raw-output '.version' "$summary")"
          run_url="$(jq --raw-output '.runUrl' "$summary")"
          if [[ ! "$version" =~ ^[0-9A-Za-z.+-]{1,64}$ ]]; then
            echo "Invalid Codex version in compatibility summary." >&2
            exit 1
          fi
          source_run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/${{ github.run_id }}"
          if [ "$run_url" != "$source_run_url" ]; then
            echo "Invalid run URL in compatibility summary." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
      - name: File a deduplicated compatibility issue
        env:
          GH_TOKEN: ${{ github.token }}
          CODEX_VERSION: ${{ steps.summary.outputs.version }}
          SOURCE_RUN_URL: ${{ steps.summary.outputs.run_url }}
        shell: bash
        run: |
          marker="<!-- codex-app-server-contract-drift -->"
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search 'Codex app-server contract drift in:title' --json body --jq ".[] | select(.body | contains(\"$marker\")) | .body" --limit 1)"
          if [ -n "$existing" ]; then
            echo "An open Codex contract-drift issue already exists."
            exit 0
          fi
          {
            echo "$marker"
            echo "The compatibility check found that Codex $CODEX_VERSION no longer preserves the supported app-server contract."
            echo
            echo "Run: $SOURCE_RUN_URL"
          } > "$RUNNER_TEMP/codex-contract-issue.md"
          gh issue create --repo "$GITHUB_REPOSITORY" --title "Codex app-server contract drift: $CODEX_VERSION" --body-file "$RUNNER_TEMP/codex-contract-issue.md"
