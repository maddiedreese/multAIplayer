name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 8 * * 3"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changed domains
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.paths.outputs.workflow }}
      javascript: ${{ steps.paths.outputs.javascript }}
      native: ${{ steps.paths.outputs.native }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: paths
        uses: ./.github/actions/changed-domains

  analyze:
    # Keep this job id stable: GitHub identifies the default CodeQL
    # configuration as <workflow path>:<job id> when comparing a PR with main.
    # The additional language matrix below must not replace that identity.
    name: JavaScript and TypeScript
    needs: changes
    if: needs.changes.outputs.javascript == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  analyze-actions:
    name: actions
    needs: changes
    if: needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: actions
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:actions"

  analyze-rust:
    name: rust
    needs: changes
    if: needs.changes.outputs.native == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: rust
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:rust"
