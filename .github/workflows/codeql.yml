name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 8 * * 3"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changed domains
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.paths.outputs.workflow }}
      javascript: ${{ steps.paths.outputs.javascript }}
      native: ${{ steps.paths.outputs.native }}
      cli: ${{ steps.paths.outputs.cli }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: paths
        uses: ./.github/actions/changed-domains

  analyze:
    # Keep this job id stable: GitHub identifies the default CodeQL
    # configuration as <workflow path>:<job id> when comparing a PR with main.
    # The repository code-scanning ruleset compares every PR with this
    # configuration, so it must run even when a PR does not edit JavaScript.
    # The additional language matrix below must not replace that identity.
    name: JavaScript and TypeScript
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  analyze-actions:
    # The repository code-scanning ruleset compares every PR with the Actions
    # configuration on main, so this analysis must be present even when the PR
    # does not edit workflow files.
    name: actions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: actions
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:actions"

  analyze-rust:
    # The repository code-scanning ruleset also compares every PR with the Rust
    # configuration on main. Keep this result present for documentation-only
    # and other non-Rust changes so GitHub can evaluate the merge safely.
    name: rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          build-mode: none
          config-file: ./.github/codeql-config.yml
          languages: rust
          queries: security-extended
      - name: Analyze production code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:rust"
