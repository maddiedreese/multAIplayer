name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v0.1.0-alpha.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  macos-prerelease:
    name: macOS prerelease
    runs-on: macos-15
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        shell: bash
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$RELEASE_INPUT_TAG" ]; then
            tag="$RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must start with v and contain only letters, numbers, dots, underscores, or hyphens: $tag" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "Tag does not exist: $tag" >&2
            exit 1
          fi
          git checkout --detach "refs/tags/$tag"
          prerelease=false
          case "$tag" in
            *alpha*|*beta*|*rc*) prerelease=true ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Detect Apple signing configuration
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Apple signing/notarization secret(s): %s\n' "${missing[*]}" >&2
            echo "Public release artifacts must be Developer ID signed and notarized." >&2
            exit 1
          fi
          echo "Release build will use Developer ID signing and notarization."

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      - name: Verify
        run: npm run verify

      - name: Build signed and notarized Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build:prebuilt -w @multaiplayer/desktop

      - name: Verify signed and notarized app
        run: |
          app_path="apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app"
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vvv -t install "$app_path"
          spctl -a -vvv -t open --context context:primary-signature "$dmg_path"

      - name: Package release assets
        run: |
          mkdir -p release-assets
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found." >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/$(basename "$dmg_path")"
          ditto -c -k --sequesterRsrc --keepParent \
            apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app \
            release-assets/multAIplayer-macos-app.zip
          (cd release-assets && shasum -a 256 * > SHA256SUMS.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          args=()
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          signing_notes="$(cat <<'EOF'
          Important alpha notes:
          - This macOS app is Developer ID signed and notarized.
          - Treat it as security-sensitive alpha software and prefer test/self-hosted rooms before using private projects.
          - See `SHA256SUMS.txt` for release asset checksums.
          EOF
          )"
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "multAIplayer $RELEASE_TAG" \
            --notes "Automated macOS release build.

          $signing_notes" \
            "${args[@]}"

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
