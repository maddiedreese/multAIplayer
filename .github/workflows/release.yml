name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v0.1.0-alpha.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed macOS artifacts
    runs-on: macos-15
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        shell: bash
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$RELEASE_INPUT_TAG" ]; then
            tag="$RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must start with v and contain only letters, numbers, dots, underscores, or hyphens: $tag" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "Tag does not exist: $tag" >&2
            exit 1
          fi
          git checkout --detach "refs/tags/$tag"
          prerelease=false
          case "$tag" in
            *alpha*|*beta*|*rc*) prerelease=true ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Detect Apple signing configuration
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Apple signing/notarization secret(s): %s\n' "${missing[*]}" >&2
            echo "Public release artifacts must be Developer ID signed and notarized." >&2
            exit 1
          fi
          echo "Release build will use Developer ID signing and notarization."

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      - name: Run release preflight
        run: npm run release:preflight

      - name: Build signed and notarized Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build:prebuilt -w @multaiplayer/desktop

      - name: Verify signed and notarized app
        run: |
          app_path="apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app"
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vvv -t install "$app_path"
          spctl -a -vvv -t open --context context:primary-signature "$dmg_path"

      - name: Package release assets
        run: |
          mkdir -p release-assets
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found." >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/$(basename "$dmg_path")"
          ditto -c -k --sequesterRsrc --keepParent \
            apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app \
            release-assets/multAIplayer-macos-app.zip

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          artifact-name: multaiplayer.spdx.json
          output-file: release-assets/multaiplayer.spdx.json
          upload-artifact: false

      - name: Generate release checksums
        run: (cd release-assets && shasum -a 256 * > SHA256SUMS.txt)

      - name: Upload trusted release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ steps.release.outputs.tag }}
          path: release-assets
          if-no-files-found: error
          retention-days: 7

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  publish:
    name: Attest, sign, and publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download trusted build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-${{ needs.build.outputs.tag }}
          path: release-assets

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release-assets/*

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Keyless-sign checksums and SBOM
        run: |
          cosign sign-blob --yes --bundle release-assets/SHA256SUMS.txt.sigstore.json release-assets/SHA256SUMS.txt
          cosign sign-blob --yes --bundle release-assets/multaiplayer.spdx.json.sigstore.json release-assets/multaiplayer.spdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ needs.build.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          args=()
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          signing_notes="$(cat <<'EOF'
          Important alpha notes:
          - This macOS app is Developer ID signed and notarized.
          - Treat it as security-sensitive alpha software and prefer test/self-hosted rooms before using private projects.
          - See `SHA256SUMS.txt` for release asset checksums.
          EOF
          )"
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "multAIplayer $RELEASE_TAG" \
            --notes "Automated macOS release build.

          $signing_notes" \
            "${args[@]}"
