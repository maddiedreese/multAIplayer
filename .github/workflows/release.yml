name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v0.1.0-alpha.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release pull request
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Select release automation credential
        id: credential
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -n "$RELEASE_PLEASE_TOKEN" ]; then
            echo "uses_custom_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "uses_custom_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or update the release pull request
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
      - name: Check out the generated release branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
      - name: Set up locked Node and npm for release metadata synchronization
        if: steps.release.outputs.prs_created == 'true'
        uses: ./.github/actions/setup-node-npm
      - name: Synchronize generated lock metadata
        if: steps.release.outputs.prs_created == 'true'
        run: |
          npm run sync:release-versions
          npm run check:release-versions
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json apps packages
          git commit --signoff --message "chore: synchronize release metadata"
          git push
      - name: Dispatch protected checks for a built-in-token release pull request
        if: steps.release.outputs.prs_created == 'true' && steps.credential.outputs.uses_custom_token == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
        run: |
          gh workflow run ci.yml --ref "$RELEASE_BRANCH"
          gh workflow run journeys.yml --ref "$RELEASE_BRANCH" --field required_only=true
      - name: Dispatch the signed release build when using the built-in token
        if: steps.release.outputs.release_created == 'true' && steps.credential.outputs.uses_custom_token == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run release.yml --ref "$RELEASE_TAG" --field tag="$RELEASE_TAG"

  resolve:
    name: Resolve immutable release source
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Check out release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Resolve the tag once and require a main-reachable commit
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_REF: ${{ github.ref }}
          RELEASE_EVENT_SHA: ${{ github.sha }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${RELEASE_INPUT_TAG:-$GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag is invalid: $tag" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "Tag does not exist: $tag" >&2
            exit 1
          fi
          if [ "$RELEASE_EVENT_REF" != "refs/tags/$tag" ]; then
            echo "Release workflow ref must be refs/tags/$tag; found $RELEASE_EVENT_REF." >&2
            echo "Dispatch the workflow on the release tag, not main or another branch." >&2
            exit 1
          fi
          git fetch --no-tags origin main:refs/remotes/origin/main
          commit="$(git rev-parse "refs/tags/$tag^{commit}")"
          if [ "$commit" != "$RELEASE_EVENT_SHA" ]; then
            echo "Release event SHA does not match the resolved tag: event $RELEASE_EVENT_SHA, tag $commit" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$commit" refs/remotes/origin/main; then
            echo "Release tag $tag does not resolve to a commit reachable from main: $commit" >&2
            exit 1
          fi
          release_metadata="$RUNNER_TEMP/existing-release.json"
          release_error="$RUNNER_TEMP/existing-release-error.txt"
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" > "$release_metadata" 2> "$release_error"; then
            if [ "$(jq -r .draft "$release_metadata")" = "false" ]; then
              echo "Release $tag is already public; refusing to rebuild or emit new transparency records." >&2
              echo "If updater-channel advancement failed in its original run, use GitHub's Re-run failed jobs action on that run." >&2
              exit 1
            fi
          elif ! grep -q '(HTTP 404)' "$release_error"; then
            cat "$release_error" >&2
            exit 1
          fi
          prerelease=false
          case "$tag" in
            *alpha*|*beta*|*rc*) prerelease=true ;;
          esac
          {
            echo "commit=$commit"
            echo "prerelease=$prerelease"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  release-native-gate:
    name: Release two-client native MLS gate
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.commit }}
      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0
      - name: Install Tauri, WebDriver, display, and Secret Service dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          build-essential
          dbus-x11
          gnome-keyring
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          libwebkit2gtk-4.1-dev
          libxdo-dev
          webkit2gtk-driver
          xvfb
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Build native journey dependencies
        run: |
          npm run build:packages
          cargo build --locked --manifest-path apps/desktop/src-tauri/Cargo.toml -p mls-core --bin mls-keypackage-validator
          cargo install tauri-driver --version 2.0.6 --locked
      - name: Exercise two real native clients before release publication
        run: xvfb-run -a npm run test:e2e:native

  build:
    name: Build signed macOS artifacts
    needs: [resolve, release-native-gate]
    if: needs.release-native-gate.result == 'success'
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      commit: ${{ needs.resolve.outputs.commit }}
      prerelease: ${{ needs.resolve.outputs.prerelease }}
      tag: ${{ needs.resolve.outputs.tag }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      VITE_RELAY_HTTP_URL: ${{ vars.OFFICIAL_RELAY_HTTP_URL }}
      VITE_RELAY_URL: ${{ vars.OFFICIAL_RELAY_WS_URL }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.commit }}

      - name: Set up locked Node and npm
        uses: ./.github/actions/setup-node-npm

      - name: Install Apple silicon Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Detect release signing configuration
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing release signing secret(s): %s\n' "${missing[*]}" >&2
            echo "Public releases require Developer ID signing, notarization, and a password-protected updater signature." >&2
            exit 1
          fi
          echo "Release build will use Developer ID signing/notarization and the Tauri updater signer."

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      - name: Validate official relay endpoints
        run: |
          case "$VITE_RELAY_HTTP_URL" in https://*) ;; *) echo "OFFICIAL_RELAY_HTTP_URL must be a configured HTTPS URL." >&2; exit 1 ;; esac
          case "$VITE_RELAY_URL" in wss://*) ;; *) echo "OFFICIAL_RELAY_WS_URL must be a configured WSS URL." >&2; exit 1 ;; esac

      - name: Run release preflight
        run: npm run release:preflight

      - name: Verify live invitation app-site associations
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run verify:aasa

      - name: Remove cached bundle products
        run: rm -rf apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle

      - name: Build signed and notarized Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:release -w @multaiplayer/desktop

      - name: Verify signed and notarized app
        run: |
          bundle_root="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle"
          app_path="$bundle_root/macos/multAIplayer.app"
          release_version="$(node -p "require('./apps/desktop/package.json').version")"
          dmg_path="$bundle_root/dmg/multAIplayer_${release_version}_aarch64.dmg"
          dmg_count="$(find "$bundle_root/dmg" -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')"
          if [ "$dmg_count" != "1" ] || [ ! -f "$dmg_path" ]; then
            echo "Expected exactly one DMG at $dmg_path; found $dmg_count DMG file(s)." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vvv -t install "$app_path"
          spctl -a -vvv -t open --context context:primary-signature "$dmg_path"
          archs="$(lipo -archs "$app_path/Contents/MacOS/multAIplayer")"
          if [ "$archs" != "arm64" ]; then
            echo "Release executable must contain only arm64; found: $archs" >&2
            exit 1
          fi
          minimum_system_version="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$app_path/Contents/Info.plist")"
          if [ "$minimum_system_version" != "11.0" ]; then
            echo "Release minimum macOS version must be 11.0; found: $minimum_system_version" >&2
            exit 1
          fi
          bash scripts/verify-macos-deployment-target.sh "$app_path"
          npm run verify:macos-associated-domains -- "$app_path"

      - name: Rebuild unsigned payload in an isolated target directory
        id: reproducibility-rebuild
        continue-on-error: true
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/multaiplayer-repro-target
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: npm run tauri:build:release -w @multaiplayer/desktop -- --no-sign --bundles app

      - name: Compare normalized signed and rebuilt payloads
        id: reproducibility-compare
        if: steps.reproducibility-rebuild.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p reproducibility-evidence
          node tools/release/compare-macos-app-payloads.mjs \
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app \
            "$RUNNER_TEMP/multaiplayer-repro-target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app" \
            reproducibility-evidence

      - name: Package advisory reproducibility evidence
        if: always()
        env:
          REBUILD_OUTCOME: ${{ steps.reproducibility-rebuild.outcome }}
          COMPARE_OUTCOME: ${{ steps.reproducibility-compare.outcome }}
        run: |
          mkdir -p reproducibility-evidence release-assets
          if [ ! -f reproducibility-evidence/comparison.json ]; then
            printf '{"matched":false,"comparisonUnavailable":true,"rebuildOutcome":"%s","compareOutcome":"%s","caveat":"This advisory result is not a bit-for-bit claim for signed, notarized, stapled, or packaged output."}\n' \
              "$REBUILD_OUTCOME" "$COMPARE_OUTCOME" > reproducibility-evidence/comparison.json
          fi
          {
            echo "commit=$(git rev-parse HEAD)"
            echo "node=$(node --version)"
            echo "npm=$(npm --version)"
            echo "rustc=$(rustc --version)"
            echo "cargo=$(cargo --version)"
            xcodebuild -version
            sw_vers
          } > reproducibility-evidence/build-environment.txt
          ditto -c -k --sequesterRsrc --keepParent \
            reproducibility-evidence \
            release-assets/desktop-reproducibility-evidence.zip

      - name: Package release assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          mkdir -p release-assets
          bundle_root="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle"
          release_version="$(node -p "require('./apps/desktop/package.json').version")"
          dmg_path="$bundle_root/dmg/multAIplayer_${release_version}_aarch64.dmg"
          dmg_count="$(find "$bundle_root/dmg" -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')"
          if [ "$dmg_count" != "1" ] || [ ! -f "$dmg_path" ]; then
            echo "Expected exactly one DMG at $dmg_path; found $dmg_count DMG file(s)." >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/$(basename "$dmg_path")"
          ditto -c -k --sequesterRsrc --keepParent \
            "$bundle_root/macos/multAIplayer.app" \
            release-assets/multAIplayer-macos-arm64-app.zip
          updater_path="$(find "$bundle_root/macos" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)"
          if [ -z "$updater_path" ] || [ ! -f "$updater_path.sig" ]; then
            echo "Signed Tauri updater bundle and signature are required." >&2
            exit 1
          fi
          updater_name="multAIplayer-macos-arm64.app.tar.gz"
          cp "$updater_path" "release-assets/$updater_name"
          cp "$updater_path.sig" "release-assets/$updater_name.sig"
          metadata_payload="$RUNNER_TEMP/multaiplayer-updater-metadata.json"
          node tools/release/write-tauri-update-manifest.mjs payload \
            "${{ needs.resolve.outputs.tag }}" \
            apps/desktop/package.json \
            "$updater_name" \
            "release-assets/$updater_name.sig" \
            "$metadata_payload"
          npx tauri signer sign "$metadata_payload"
          node tools/release/write-tauri-update-manifest.mjs manifest \
            "${{ needs.resolve.outputs.tag }}" \
            apps/desktop/package.json \
            "$updater_name" \
            "release-assets/$updater_name.sig" \
            "$metadata_payload.sig" \
            release-assets/latest.json
          cargo run --locked \
            --manifest-path apps/desktop/src-tauri/Cargo.toml \
            --bin verify_update_manifest -- \
            release-assets/latest.json \
            "release-assets/$updater_name"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/multAIplayer.app
          artifact-name: multaiplayer.spdx.json
          output-file: release-assets/multaiplayer.spdx.json
          upload-artifact: false

      - name: Generate release checksums
        run: (cd release-assets && shasum -a 256 ./* > SHA256SUMS.txt)

      - name: Validate canonical build asset contract
        run: npm run verify:release-assets -- build release-assets

      - name: Upload trusted release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ needs.resolve.outputs.tag }}
          path: release-assets
          if-no-files-found: error
          retention-days: 7

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  publish:
    name: Attest, sign, and publish
    needs: build
    environment: public-alpha-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out the released contract and validation tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.build.outputs.commit }}
      - name: Download trusted build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-${{ needs.build.outputs.tag }}
          path: release-assets

      - name: Classify an ambiguous publication retry
        id: public-state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build.outputs.commit }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          echo "already_public=false" >> "$GITHUB_OUTPUT"
          release_metadata="$RUNNER_TEMP/release-metadata.json"
          release_error="$RUNNER_TEMP/release-metadata-error.txt"
          if ! gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            > "$release_metadata" 2> "$release_error"; then
            if grep -q '(HTTP 404)' "$release_error"; then
              exit 0
            fi
            cat "$release_error" >&2
            exit 1
          fi
          if [ "$(jq -r .draft "$release_metadata")" != "false" ]; then
            exit 0
          fi
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$remote_commit" != "$RELEASE_COMMIT" ]; then
            echo "Release tag moved after source resolution: expected $RELEASE_COMMIT, found $remote_commit" >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/public-release-assets"
          gh release download "$RELEASE_TAG" \
            --dir "$RUNNER_TEMP/public-release-assets" \
            --repo "$GITHUB_REPOSITORY"
          node tools/release/check-release-assets.mjs published "$RUNNER_TEMP/public-release-assets"
          node tools/release/validate-release-asset-digests.mjs \
            "$RUNNER_TEMP/public-release-assets" \
            "$release_metadata" \
            "$RUNNER_TEMP/public-release-asset-names.txt"

          node tools/release/check-release-assets.mjs build release-assets
          find release-assets -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort \
            > "$RUNNER_TEMP/build-release-asset-names.txt"
          node tools/release/validate-release-asset-digests.mjs \
            release-assets \
            "$release_metadata" \
            "$RUNNER_TEMP/authenticated-build-asset-names.txt" \
            "$RUNNER_TEMP/build-release-asset-names.txt"
          echo "Release $RELEASE_TAG is already public with the exact retained build output and authenticated canonical public asset set."
          echo "already_public=true" >> "$GITHUB_OUTPUT"

      - name: Attest release artifact provenance
        if: steps.public-state.outputs.already_public != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*

      - name: Install cosign
        if: steps.public-state.outputs.already_public != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign checksums and SBOM
        if: steps.public-state.outputs.already_public != 'true'
        run: |
          cosign sign-blob --yes --bundle release-assets/SHA256SUMS.txt.sigstore.json release-assets/SHA256SUMS.txt
          cosign sign-blob --yes --bundle release-assets/multaiplayer.spdx.json.sigstore.json release-assets/multaiplayer.spdx.json

      - name: Validate canonical published asset contract
        if: steps.public-state.outputs.already_public != 'true'
        run: node tools/release/check-release-assets.mjs published release-assets

      - name: Reconcile the private draft release to the canonical asset set
        if: steps.public-state.outputs.already_public != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build.outputs.commit }}
          RELEASE_PRERELEASE: ${{ needs.build.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$remote_commit" != "$RELEASE_COMMIT" ]; then
            echo "Release tag moved after source resolution: expected $RELEASE_COMMIT, found $remote_commit" >&2
            exit 1
          fi
          assert_private_draft() {
            if [ "$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "Refusing to mutate already-public release $RELEASE_TAG." >&2
              exit 1
            fi
          }
          release_metadata="$RUNNER_TEMP/release-metadata.json"
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > "$release_metadata" 2>/dev/null; then
            if [ "$(jq -r .draft "$release_metadata")" != "true" ]; then
              mkdir -p "$RUNNER_TEMP/public-release-assets"
              gh release download "$RELEASE_TAG" \
                --dir "$RUNNER_TEMP/public-release-assets" \
                --repo "$GITHUB_REPOSITORY"
              node tools/release/validate-release-asset-digests.mjs \
                release-assets \
                "$release_metadata" \
                "$RUNNER_TEMP/local-release-asset-names.txt"
              node tools/release/check-release-assets.mjs \
                published-list "$RUNNER_TEMP/local-release-asset-names.txt"
              node tools/release/validate-release-asset-digests.mjs \
                "$RUNNER_TEMP/public-release-assets" \
                "$release_metadata" \
                "$RUNNER_TEMP/public-release-asset-names.txt"
              node tools/release/check-release-assets.mjs \
                published-list "$RUNNER_TEMP/public-release-asset-names.txt"
              echo "Release $RELEASE_TAG is already public with the exact authenticated asset set; leaving it unchanged."
              exit 0
            fi
          else
            release_args=(--generate-notes --draft)
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" "${release_args[@]}"
          fi

          # A failed private-draft attempt may have left either stale extras or
          # an incomplete canonical set. Remove only draft assets, then upload
          # the locally validated set without --clobber.
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
            > "$RUNNER_TEMP/existing-release-assets.txt"
          while IFS= read -r asset; do
            if [ -n "$asset" ]; then
              assert_private_draft
              gh release delete-asset "$RELEASE_TAG" "$asset" --yes --repo "$GITHUB_REPOSITORY"
            fi
          done < "$RUNNER_TEMP/existing-release-assets.txt"
          assert_private_draft
          gh release upload "$RELEASE_TAG" release-assets/* --repo "$GITHUB_REPOSITORY"

          assert_private_draft
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
            > "$RUNNER_TEMP/remote-release-assets.txt"
          node tools/release/check-release-assets.mjs published-list "$RUNNER_TEMP/remote-release-assets.txt"
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > "$release_metadata"
          node tools/release/validate-release-asset-digests.mjs \
            release-assets "$release_metadata" "$RUNNER_TEMP/remote-release-assets.txt"
          node tools/release/check-release-assets.mjs published-list "$RUNNER_TEMP/remote-release-assets.txt"

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            gh release edit "$RELEASE_TAG" --prerelease --repo "$GITHUB_REPOSITORY"
          fi
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$remote_commit" != "$RELEASE_COMMIT" ]; then
            echo "Release tag moved before publication: expected $RELEASE_COMMIT, found $remote_commit" >&2
            exit 1
          fi
          assert_private_draft
          gh release edit "$RELEASE_TAG" --draft=false --repo "$GITHUB_REPOSITORY"

  advance-updater-channel:
    name: Advance updater availability channel
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: updater-availability-channel
      cancel-in-progress: false
    steps:
      - name: Check out released channel validation tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.build.outputs.commit }}
      - name: Download and authenticate the immutable public release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          mkdir -p public-release-assets
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$remote_commit" != "${{ needs.build.outputs.commit }}" ]; then
            echo "Release tag moved after source resolution." >&2
            exit 1
          fi
          gh release download "$RELEASE_TAG" --dir public-release-assets --repo "$GITHUB_REPOSITORY"
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release-metadata.json"
          if [ "$(jq -r .draft "$RUNNER_TEMP/release-metadata.json")" != "false" ]; then
            echo "Updater channel requires a public release: $RELEASE_TAG" >&2
            exit 1
          fi
          node tools/release/validate-release-asset-digests.mjs \
            public-release-assets "$RUNNER_TEMP/release-metadata.json" "$RUNNER_TEMP/release-asset-names.txt"
          node tools/release/check-release-assets.mjs published-list "$RUNNER_TEMP/release-asset-names.txt"
      - name: Advance without permitting a SemVer regression
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.build.outputs.commit }}
        run: |
          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/update-channel" >/dev/null 2>&1; then
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref=refs/heads/update-channel \
              -f sha="$RELEASE_COMMIT" >/dev/null
          fi
          existing_response="$RUNNER_TEMP/existing-channel.json"
          existing_sha=""
          if gh api "repos/$GITHUB_REPOSITORY/contents/releases/latest.json?ref=update-channel" > "$existing_response" 2>/dev/null; then
            existing_sha="$(jq -r .sha "$existing_response")"
            jq -r .content "$existing_response" | tr -d '\n' | base64 --decode > "$RUNNER_TEMP/existing-latest.json"
            node tools/release/check-updater-channel-order.mjs \
              public-release-assets/latest.json "$RUNNER_TEMP/existing-latest.json"
            if cmp -s public-release-assets/latest.json "$RUNNER_TEMP/existing-latest.json"; then
              echo "Updater channel already points to $RELEASE_TAG."
              exit 0
            fi
          fi
          encoded_manifest="$(base64 < public-release-assets/latest.json | tr -d '\n')"
          request=(
            --method PUT
            "repos/$GITHUB_REPOSITORY/contents/releases/latest.json"
            -f message="chore: advance updater channel to $RELEASE_TAG"
            -f content="$encoded_manifest"
            -f branch=update-channel
          )
          if [ -n "$existing_sha" ]; then
            request+=(-f sha="$existing_sha")
          fi
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$remote_commit" != "$RELEASE_COMMIT" ]; then
            echo "Release tag moved before updater-channel advancement: expected $RELEASE_COMMIT, found $remote_commit" >&2
            exit 1
          fi
          gh api "${request[@]}" >/dev/null
