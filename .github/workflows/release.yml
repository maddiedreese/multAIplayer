name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v0.1.0-alpha.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  macos-prerelease:
    name: macOS prerelease
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        shell: bash
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$RELEASE_INPUT_TAG" ]; then
            tag="$RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must start with v and contain only letters, numbers, dots, underscores, or hyphens: $tag" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "Tag does not exist: $tag" >&2
            exit 1
          fi
          git checkout --detach "refs/tags/$tag"
          prerelease=false
          case "$tag" in
            *alpha*|*beta*|*rc*) prerelease=true ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Detect Apple signing configuration
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          can_sign=false
          can_notarize=false
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            can_sign=true
          fi
          if [ "$can_sign" = "true" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            can_notarize=true
          fi
          echo "can_sign=$can_sign" >> "$GITHUB_OUTPUT"
          echo "can_notarize=$can_notarize" >> "$GITHUB_OUTPUT"
          if [ "$can_notarize" = "true" ]; then
            echo "Release build will use Developer ID signing and notarization."
          else
            echo "Release build will remain unsigned/not notarized because Apple signing secrets are incomplete."
          fi

      - name: Verify
        run: npm run verify

      - name: Build signed and notarized Tauri app
        if: steps.signing.outputs.can_notarize == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build -w @multaiplayer/desktop

      - name: Build unsigned Tauri app
        if: steps.signing.outputs.can_notarize != 'true'
        run: npm run tauri:build -w @multaiplayer/desktop

      - name: Verify signed and notarized app
        if: steps.signing.outputs.can_notarize == 'true'
        run: |
          app_path="apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl -a -vvv -t install "$app_path"

      - name: Package release assets
        run: |
          mkdir -p release-assets
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "No DMG found." >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/$(basename "$dmg_path")"
          ditto -c -k --sequesterRsrc --keepParent \
            apps/desktop/src-tauri/target/release/bundle/macos/multAIplayer.app \
            release-assets/multAIplayer-macos-app.zip
          (cd release-assets && shasum -a 256 * > SHA256SUMS.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_CAN_NOTARIZE: ${{ steps.signing.outputs.can_notarize }}
        run: |
          args=()
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ "$RELEASE_CAN_NOTARIZE" = "true" ]; then
            signing_notes="$(cat <<'EOF'
          Important alpha notes:
          - This macOS app is Developer ID signed and notarized.
          - Treat it as security-sensitive alpha software and prefer test/self-hosted rooms before using private projects.
          - See `SHA256SUMS.txt` for release asset checksums.
          EOF
          )"
          else
            signing_notes="$(cat <<'EOF'
          Important alpha notes:
          - This app is unsigned and not notarized yet. macOS Gatekeeper may require manual approval to open it.
          - Treat it as security-sensitive alpha software and prefer test/self-hosted rooms before using private projects.
          - See `SHA256SUMS.txt` for release asset checksums.
          EOF
          )"
          fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "multAIplayer $RELEASE_TAG" \
            --notes "Automated macOS release build.

          $signing_notes" \
            "${args[@]}"
