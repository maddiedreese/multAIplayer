version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      # Keep compiler and platform types aligned with typescript-eslint and the Node 24 runtime.
      - dependency-name: typescript
        versions:
          - ">= 6.1"
      - dependency-name: "@types/node"
        versions:
          - ">= 25"
    groups:
      npm-compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # Major updates remain individual PRs. They frequently carry runtime or
      # configuration migrations that cannot be reviewed honestly as one batch.

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      cargo-compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # The mls-rs crates share public types and must move together. Other
      # Cargo majors remain individual PRs so crypto, RNG, storage, and age
      # migrations keep separate compatibility and rollback boundaries.
      cargo-mls-major-updates:
        patterns:
          - "mls-rs"
          - "mls-rs-*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      github-actions-update-batch:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /apps/relay
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
