version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      # Keep compiler and platform types aligned with typescript-eslint and the Node 22 runtime.
      - dependency-name: typescript
        versions:
          - ">= 6.1"
      - dependency-name: "@types/node"
        versions:
          - ">= 23"
    groups:
      npm-compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major-update-batch:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      cargo-compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      cargo-major-update-batch:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      github-actions-update-batch:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /apps/relay
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
