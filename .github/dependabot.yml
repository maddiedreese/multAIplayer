version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      npm-development-dependencies:
        dependency-type: development

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
